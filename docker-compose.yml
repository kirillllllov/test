services:
  app:
    image: cajodev/support-bot-app:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.hostname == oar
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.support-bot.entrypoints=httpLocal"
        - "traefik.http.routers.support-bot.rule=Host(`study.dev.fardrive.ru`)"
        - "traefik.http.services.support-bot.loadbalancer.server.port=3001"
        - "traefik.docker.network=proxy"
    environment:
      - NODE_ENV=test
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - S3_ENDPOINT=http://minio-bot:9000
      - S3_BUCKET=support-bot
      - DYNAMODB_ENDPOINT=http://dynamodb:8000
      - PORT=3001
    depends_on:
      - minio-bot
      - dynamodb
    networks:
      - default
      - proxy

  minio-bot:
    image: minio/minio:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.hostname == oar
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.minio-bot.entrypoints=httpLocal"
        - "traefik.http.routers.minio-bot.rule=Host(`study.dev.fardrive.ru`) && PathPrefix(`/minio-bot`)"
        - "traefik.http.middlewares.minio-bot-stripprefix.stripprefix.prefixes=/minio-bot"
        - "traefik.http.routers.minio-bot.middlewares=minio-bot-stripprefix"
        - "traefik.http.services.minio-bot.loadbalancer.server.port=9000"
        - "traefik.docker.network=proxy"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: minio server /data --console-address ":9001"
    volumes:
      - minio-bot_data:/data
    networks:
      - default
      - proxy

  dynamodb:
    image: amazon/dynamodb-local:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.hostname == oar
    command: -jar DynamoDBLocal.jar -sharedDb
    volumes:
      - dynamodb_data:/home/dynamodblocal
    networks:
      - default

volumes:
  minio-bot_data:
    driver: local
  dynamodb_data:
    driver: local

networks:
  default:
  proxy:
    external: true