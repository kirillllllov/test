name: Build and Push to Docker Hub

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Yarn
      run: npm install -g yarn
      
    - name: Install dependencies
      run: yarn install --frozen-lockfile
      
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build commit image
      run: docker build -f Dockerfile.prod -t vladk1402/support_bot:${{ github.sha }} .
        
    - name: Build latest image  
      run: docker build -f Dockerfile.prod -t vladk1402/support_bot:latest .
        
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Push commit image
      run: docker push vladk1402/support_bot:${{ github.sha }}
        
    - name: Push latest image
      run: docker push vladk1402/support_bot:latest
        
    - name: Success
      run: echo "🎉 Image successfully built and pushed to Docker Hub!"